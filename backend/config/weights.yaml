# ======================================
# 🐾 반려동물 산책 루트 가중치 설정
# ======================================
# 값이 클수록 해당 요소를 더 강하게 기피합니다
# 1.0 미만은 보너스(선호), 1.0 초과는 페널티(기피)
# 기본 비용 = edge_length(m) × (각 penalty 곱)

# --- 도로 유형별 페널티 승수 ---
highway_penalty:
  # 보행 전용 (가장 선호)
  footway: 1.0
  pedestrian: 1.0
  living_street: 1.2 # 생활도로 — 약간의 차량 통행
  track: 1.1 # 비포장 산책로
  # 계단 (강하게 기피)
  steps: 5.0
  # 그 외 (매핑 안 된 타입)
  unknown: 1.5

# --- 도로 폭(width)에 따른 페널티 ---
width_penalty:
  narrow_threshold_m: 1.5 # 이 값 미만이면 "좁은 길"
  narrow_multiplier: 3.0 # 좁은 길 페널티 승수
  no_data_multiplier: 1.1 # 폭 정보 없을 때 약간의 불확실성 페널티

# --- 노면(surface) 선호도 ---
surface_penalty:
  asphalt: 1.0
  paving_stones: 1.0
  concrete: 1.0
  paved: 1.0
  rubber: 0.8 # 탄성 포장 — 보너스
  tartan: 0.8
  urethane: 0.8
  wood: 1.2
  ground: 1.3
  compacted: 1.1
  dirt: 1.5
  earth: 1.5
  cobblestone: 1.8 # 울퉁불퉁한 돌길
  "concrete:plates": 1.0
  "concrete:lanes": 1.0
  unpaved: 1.4
  stone: 1.5
  rock: 2.0
  "Braille_blocks": 1.0
  unknown: 1.1 # 정보 없을 때

# --- 계단(stairs) 오버레이 ---
stairs_penalty:
  buffer_m: 15 # 계단 주변 이 거리(m) 내 엣지에 추가 페널티
  multiplier: 4.0 # 계단 근접 엣지 페널티 승수

# --- 공원/놀이터 보너스 ---
leisure_bonus:
  park_radius_m: 200 # 공원 반경 이내 엣지에 보너스
  park_multiplier: 0.7 # 보너스 (1.0 미만 = 비용 할인)
  dog_park_radius_m: 300 # 반려견 놀이터 반경
  dog_park_multiplier: 0.5 # 더 강한 보너스

# --- 루프 경로 생성 파라미터 ---
loop:
  max_waypoints: 4 # 경유지 최대 수 (클수록 복잡)
  min_waypoints: 0 # 경유지 최소 수
  shape_regularity: 0.7 # 0~1, 1에 가까울수록 원형에 가까운 루프
  revisit_penalty: 999999 # 왔던 길 다시 가는 것 방지
  num_candidates: 150 # 후보 경로 생성 시도 횟수
  walking_speed_mps: 1.0 # 산책 속도 (m/s), 기본 시속 3.6km/h
